name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
          enable-caching: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check tasks/

      - name: Format check
        run: uv run ruff format --check tasks/

      - name: Type check
        run: uv run mypy tasks/

      - name: Test
        run: uv run pytest --tb=short

      - name: SKILL.md bash lint
        run: uv run python scripts/lint_skill_bash.py
