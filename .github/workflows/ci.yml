name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install Python dependencies
        run: uv sync --all-groups

      - name: Cache pre-commit environments
        uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Lint, format, type check, security (pre-commit)
        run: uv run pre-commit run --all-files

      - name: Test
        run: uv run pytest --tb=short

      # ADR-0004 Phase 1 的交付物是「tasks/ 可經 uv tool install 安裝並執行」。
      # pytest 全部從源碼樹 import，證明不了這件事——entry point 打錯、packages 寫錯、
      # exclude 過寬，測試全數照綠，缺陷會先在使用者的安裝現場爆而非 CI。
      # 不能用 @pytest.mark.slow 涵蓋：addopts = "-m 'not slow'" 連 CI 都 deselect。
      - name: Packaging smoke test (wheel installs and runs standalone)
        run: bash scripts/packaging_smoke_test.sh
