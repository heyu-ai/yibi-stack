[[package]]
name = "yibi-stack"
version = "1.11.0"
source = { editable = "." }
dependencies = [
    { name = "click" },
    { name = "pydantic" },
]

[package.optional-dependencies]
ledger = [
    { name = "anthropic" },
    { name = "pandas" },
    { name = "pdfplumber" },
    { name = "psycopg2-binary" },
    { name = "requests" },
    { name = "sqlalchemy" },
]
tokens = [
    { name = "tiktoken" },
]

[package.dev-dependencies]
dev = [
    { name = "bandit" },
    { name = "mypy" },
    { name = "pre-commit" },
    { name = "pylint" },
    { name = "pytest" },
    { name = "ruff" },
]

[package.metadata]
requires-dist = [
    { name = "anthropic", marker = "extra == 'ledger'", specifier = ">=0.117.0" },
    { name = "click", specifier = ">=8.4.2" },
    { name = "pandas", marker = "extra == 'ledger'", specifier = ">=3.0.3" },
    { name = "pdfplumber", marker = "extra == 'ledger'", specifier = ">=0.11.10" },
    { name = "psycopg2-binary", marker = "extra == 'ledger'", specifier = ">=2.9.12" },
    { name = "pydantic", specifier = ">=2.13.4" },
    { name = "requests", marker = "extra == 'ledger'", specifier = ">=2.34.2" },
    { name = "sqlalchemy", marker = "extra == 'ledger'", specifier = ">=2.0.51" },
    { name = "tiktoken", marker = "extra == 'tokens'", specifier = ">=0.7" },
]
provides-extras = ["tokens", "ledger"]

[package.metadata.requires-dev]
dev = [
    { name = "bandit", extras = ["toml"] },
    { name = "mypy", specifier = ">=1.8.0" },
    { name = "pre-commit", specifier = ">=4.6.0" },
    { name = "pylint", specifier = ">=4.0.6" },
    { name = "pytest", specifier = ">=8.0" },
    { name = "ruff", specifier = ">=0.15.22" },
]
