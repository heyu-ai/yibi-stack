repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        exclude: ^(openspec|docs/openspec)/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy tasks/
        language: system
        types: [python]
        pass_filenames: false
        files: ^tasks/

      - id: pylint
        name: pylint
        entry: uv run pylint
        language: system
        types: [python]
        files: ^tasks/

      - id: lint-shell-syntax
        name: lint-shell-syntax (bash -n)
        entry: bash scripts/lint_shell_syntax.sh
        language: system
        pass_filenames: true
        types: [shell]

      - id: lint-shell-subshell-exit
        name: lint-shell-subshell-exit (exit in $()-called function, advisory)
        entry: python3 scripts/lint_shell_subshell_exit.py
        language: system
        pass_filenames: true
        types: [shell]
        verbose: true  # advisory：script 預設 exit 0，verbose 讓 [WARN] 在通過時仍顯示（見 PR #241 mob review）

      - id: lint-skill-bash
        name: lint-skill-bash
        entry: python3 scripts/lint_skill_bash.py
        language: system
        pass_filenames: false
        files: ^(commands|skills|plugins|\.claude/commands)/.*\.md$

      - id: lint-skill-scope
        name: lint-skill-scope
        entry: python3 scripts/lint_skill_scope.py
        language: system
        pass_filenames: false
        files: ^(skills/.*/SKILL\.md|\.claude-plugin/marketplace\.json)$

      - id: lint-rule-frontmatter
        name: lint-rule-frontmatter
        entry: python3 scripts/lint_rule_frontmatter.py
        language: system
        pass_filenames: false
        files: ^\.claude/rules/.*\.md$

      - id: lint-skill-overlap
        name: lint-skill-overlap
        entry: python3 scripts/lint_skill_overlap.py
        language: system
        pass_filenames: false
        files: ^(skills/.*/SKILL\.md|plugins/.*/skills/.*/SKILL\.md|scripts/lint_skill_overlap\.py)$
        verbose: true

      - id: check-blank-proposal
        name: check-blank-proposal
        entry: python3 scripts/check_blank_proposal.py
        language: system
        pass_filenames: true
        files: ^openspec/changes/.*/proposal\.md$

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]
