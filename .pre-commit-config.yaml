repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy tasks/
        language: system
        types: [python]
        pass_filenames: false
        files: ^tasks/

      - id: pylint
        name: pylint
        entry: uv run pylint
        language: system
        types: [python]
        files: ^tasks/

      - id: lint-skill-bash
        name: lint-skill-bash
        entry: python3 scripts/lint_skill_bash.py
        language: system
        pass_filenames: false
        files: ^(commands|skills|plugins|\.claude/commands)/.*\.md$

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]
